<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 1920 1080">
  <foreignObject width="100%" height="100%">
    <html xmlns="http://www.w3.org/1999/xhtml" lang="en">
      <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>UV Static v2</title>
        
        <!-- Scripts -->
        <script src="check.js" defer="defer"></script>
        <script src="scripts/lstimer.js" defer="defer"></script>
        <script type="text/javascript" src="https://cdn.jsdelivr.net/gh/vanjs-org/van/public/van-1.5.2.nomodule.min.js"></script>
        <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
        <script nomodule="nomodule" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
        <script src="uv/uv.bundle.js" defer="defer"></script>
        <script src="uv/uv.config.js" defer="defer"></script>
        <script src="scripts/tabs.mjs" type="module" defer="defer"></script>
        <script src="https://cdn.jsdelivr.net/gh/tf7software/Font-Awesome-pro-cdn@main/js/all.js" defer="defer"></script>

        <!-- Stylesheets -->
        <link rel="stylesheet" href="style/global.css" />
        <link rel="stylesheet" href="style/browser.css" />
        <link href="https://googleapis.com" rel="stylesheet" />

        <style>
          /* XML requires root namespace styling */
          html, body {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
            overflow: auto;
          }
        </style>

        <script type="text/javascript">
          //<![CDATA[
          window.onload = function () {
            if (!localStorage.getItem("discordAlertShown")) {
              alert("Join our discord.gg/XygZfmMM86 for bonuses, updates, links, and more!");
              localStorage.setItem("discordAlertShown", "true");
            }
          };
          //]]>
        </script>
      </head>
      <body>
        <!-- 
          ██╗ ██╗ ██╗
          ██║ ██║ ██║
          ██║ ██║ ██║
          ╚██╗ ██╔╝
